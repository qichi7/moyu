<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吃豆人游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>吃豆人游戏</h1>
            <div class="score-board">
                <span>得分: <span id="score">0</span></span>
                <span>最高分: <span id="high-score">0</span></span>
            </div>
        </div>
        <div class="game-area" id="game-area"></div>
        
        <!-- 控制区域 -->
        <div class="control-area">
            <div class="control-left">
                <div class="joystick-container">
                    <div class="joystick-base" id="joystick-base">
                        <div class="joystick-stick" id="joystick-stick"></div>
                        <div class="joystick-label">拖拽控制方向</div>
                    </div>
                </div>
            </div>
            <div class="control-right">
                <p class="control-tip">键盘：方向键移动，空格暂停</p>
                <div class="action-buttons">
                    <button class="action-btn start-btn" id="start-btn">
                        <span class="btn-icon">▶</span>
                        <span class="btn-text">开始</span>
                    </button>
                    <button class="action-btn pause-btn" id="btn-pause">
                        <span class="btn-icon">⏸</span>
                        <span class="btn-text">暂停</span>
                    </button>
                    <button class="action-btn restart-btn" id="restart-btn">
                        <span class="btn-icon">🔄</span>
                        <span class="btn-text">重开</span>
                    </button>
                    <button class="action-btn refresh-map-btn" id="refresh-map-btn">
                        <span class="btn-icon">🗺️</span>
                        <span class="btn-text">刷新地图</span>
                    </button>
                    <button class="action-btn leaderboard-btn" id="leaderboard-btn">
                        <span class="btn-icon">🏆</span>
                        <span class="btn-text">排行榜</span>
                    </button>
                </div>
            </div>
        </div>
        
        <div class="settings-container">
            <div class="settings-section">
                <h3>🎮 游戏设置</h3>
                <div class="setting-item">
                    <label>游戏速度</label>
                    <div class="control-group">
                        <input type="range" id="speed-control" min="1" max="10" value="5">
                        <span id="speed-value" class="value-display">5</span>
                    </div>
                </div>
                <div class="setting-item">
                    <label>幽灵数量</label>
                    <div class="control-group">
                        <input type="number" id="ghost-count" min="1" max="10" value="3">
                    </div>
                </div>
                <div class="setting-item">
                    <label>获胜积分数</label>
                    <div class="control-group">
                        <input type="number" id="win-score-threshold" min="0" max="10000" value="0" placeholder="0=默认">
                        <small class="help-text">设为0时，吃完所有豆子获胜；设为其他数值时，达到积分即获胜</small>
                    </div>
                </div>
            </div>
            
            <div class="settings-section">
                <h3>🔊 音效设置</h3>
                <div class="setting-item">
                    <label>启用音效</label>
                    <div class="control-group">
                        <input type="checkbox" id="enable-sound" checked>
                    </div>
                </div>
                <div class="setting-item">
                    <label>音量控制</label>
                    <div class="control-group">
                        <input type="range" id="volume-control" min="0" max="100" value="50">
                        <span class="value-display">50%</span>
                    </div>
                </div>
            </div>
            
            <div class="settings-section">
                <h3>🎨 自定义图片</h3>
                <div class="setting-item">
                    <label>吃豆人图片</label>
                    <div class="control-group">
                        <div class="file-input-wrapper">
                            <label class="file-label" for="pacman-open-upload">张嘴图片</label>
                            <input type="file" id="pacman-open-upload" accept="image/*">
                        </div>
                        <div class="file-input-wrapper">
                            <label class="file-label" for="pacman-closed-upload">闭嘴图片</label>
                            <input type="file" id="pacman-closed-upload" accept="image/*">
                        </div>
                    </div>
                </div>
                <div class="setting-item">
                    <label>幽灵图片</label>
                    <div class="control-group">
                        <div class="file-input-wrapper">
                            <label class="file-label" for="ghost-upload">上传图片组</label>
                            <input type="file" id="ghost-upload" accept="image/*" multiple>
                        </div>
                        <small class="help-text">按编号顺序替换幽灵，图片数量不足时剩余幽灵使用默认样式</small>
                    </div>
                </div>
                <div class="setting-item">
                    <label>豆子图片</label>
                    <div class="control-group">
                        <div class="file-input-wrapper">
                            <label class="file-label" for="dot-upload">上传豆子图片</label>
                            <input type="file" id="dot-upload" accept="image/*">
                        </div>
                    </div>
                </div>
                <div class="setting-item">
                    <label>无敌果实图片</label>
                    <div class="control-group">
                        <div class="file-input-wrapper">
                            <label class="file-label" for="power-fruit-upload">上传果实图片</label>
                            <input type="file" id="power-fruit-upload" accept="image/*">
                        </div>
                        <small class="help-text">吃了无敌果实后，5秒内可以吃幽灵获得100分</small>
                    </div>
                </div>
                <div class="setting-item">
                    <label>胜利图片</label>
                    <div class="control-group">
                        <div class="file-input-wrapper">
                            <label class="file-label" for="win-image-upload">上传胜利图片</label>
                            <input type="file" id="win-image-upload" accept="image/*">
                        </div>
                        <small class="help-text">胜利时图片会有晃动效果</small>
                        </div>
                    </div>
                <div class="setting-item">
                    <label>失败图片</label>
                    <div class="control-group">
                        <div class="file-input-wrapper">
                            <label class="file-label" for="lose-image-upload">上传失败图片</label>
                            <input type="file" id="lose-image-upload" accept="image/*">
                        </div>
                    </div>
                </div>
            </div>
    </div>
    
    <!-- 排行榜模态框 -->
    <div class="leaderboard-overlay" id="leaderboard-overlay" style="display: none;">
        <div class="leaderboard-content">
            <div class="leaderboard-header">
                <h2>🏆 排行榜 (GitHub Gist)</h2>
                <button class="close-btn" id="close-leaderboard">×</button>
            </div>
            <div class="leaderboard-tabs">
                <button class="tab-btn active" data-tab="today">今日榜</button>
                <button class="tab-btn" data-tab="week">本周榜</button>
                <button class="tab-btn" data-tab="all">总榜</button>
            </div>
            <div class="leaderboard-api-config" id="gist-config-section">
                <h4>GitHub Gist 配置</h4>
                <div class="config-item">
                    <label>Gist ID：</label>
                    <input type="text" id="gist-id" placeholder="如：abc123def456" style="width: 100%; padding: 8px; margin-top: 5px; background: rgba(0,0,0,0.5); border: 1px solid #444; border-radius: 5px; color: #fff;">
                    <small style="color: #888;">创建 Gist 后，URL 最后一段就是 ID</small>
                </div>
                <div class="config-item">
                    <label>Gist Token：</label>
                    <input type="text" id="gist-token" placeholder="如：ghp_xxxxx" style="width: 100%; padding: 8px; margin-top: 5px; background: rgba(0,0,0,0.5); border: 1px solid #444; border-radius: 5px; color: #fff;">
                    <small style="color: #888;">保存成绩需要 Token，只读取不需要</small>
                </div>
                <button id="save-gist-btn" style="margin-top: 10px; padding: 8px 16px; background: linear-gradient(135deg, #4caf50 0%, #45a049 100%); color: #fff; border: none; border-radius: 15px; cursor: pointer;">保存配置</button>
                <a href="https://gist.github.com/" target="_blank" style="margin-left: 10px; color: #ffeb3b;">创建 Gist</a>
                <a href="https://github.com/settings/tokens" target="_blank" style="margin-left: 10px; color: #ffeb3b;">创建 Token</a>
            </div>
            <div class="leaderboard-table-container">
                <table class="leaderboard-table" id="leaderboard-table">
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>昵称</th>
                            <th>分数</th>
                            <th>状态</th>
                            <th>日期</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                    </tbody>
                </table>
            </div>
            <div class="leaderboard-actions">
                <button class="action-btn clear-btn" id="clear-leaderboard">
                    <span class="btn-icon">🗑️</span>
                    <span class="btn-text">清空</span>
                </button>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
